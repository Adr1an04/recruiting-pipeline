name: Bug report
description: Report a reproducible problem using synthetic or redacted data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Erga. Never include credentials, résumé content, application
        data, email content, or other personal information. Report security issues privately using
        the security policy.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed all secrets and personal career data from this report.
          required: true
        - label: This is not a security vulnerability.
          required: true
  - type: input
    id: version
    attributes:
      label: Erga version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - CLI
        - MCP server
        - Hermes integration
        - Gmail integration
        - Zoho integration
        - Obsidian integration
        - Résumé workflow
        - Packaging or documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide commands or a small synthetic fixture that reproduces the problem.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, uv version, and relevant optional tools.
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      description: Optional. Remove paths, tokens, names, companies, email addresses, and other personal data.
      render: text
