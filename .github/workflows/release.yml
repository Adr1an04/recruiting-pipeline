name: Release

on:
  release:
    types:
      - published

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Verify and build release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra mcp --extra dev

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          uv run python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["RELEASE_TAG"]
          if tag != f"v{version}":
              raise SystemExit(f"release tag {tag!r} does not match package version v{version}")
          PY

      - name: Run release checks
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy src
          uv run python -m unittest discover -s tests -v

      - name: Build wheel and source archive
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: erga-mcp-${{ github.event.release.tag_name }}
          path: dist/*
          if-no-files-found: error

      - name: Attach packages to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

  publish-pypi:
    name: Publish to PyPI
    if: vars.PUBLISH_TO_PYPI == 'true'
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/erga-mcp
    permissions:
      id-token: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: erga-mcp-${{ github.event.release.tag_name }}
          path: dist

      - name: Publish with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
