# Copy this file outside the repository, then edit only the paths for a local installation.

[paths]
# Relative paths resolve from this config file's directory.
data_dir = "state"
vault_path = ""

[mail]
# Supported read-only adapters: "zoho" and "gmail". Gmail uses an already-authenticated gws CLI.
provider = "zoho"
gws_command = "gws"
# Non-secret client identifier for scheduled Zoho sync; credentials stay in the OS keyring.
client_id = ""
accounts_url = "https://accounts.zoho.com"
folder = "Job Applications"

[tracking]
# Set enabled only when a local Markdown/Obsidian tracker directory is desired.
enabled = false
tracker_dir = ""

[privacy]
retain_message_bodies = false
retain_attachments = false
